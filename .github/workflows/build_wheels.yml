name: Build Payload
on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build_payload:
    name: Build shared library
    runs-on: ubuntu-24.04
    
    steps:
      - uses: actions/checkout@v4

      - name: Build SO
        run: |
          gcc -shared -fPIC -o libpayload.so src/metrics.c

      - name: Upload SO
        uses: actions/upload-artifact@v4
        with:
          name: libpayload
          path: libpayload.so
