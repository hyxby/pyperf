name: Build SO 
on: [workflow_dispatch] 
jobs: 
  build: 
    runs-on: ubuntu-24.04 
    steps: 
      - uses: actions/checkout@v4 
      - run: sudo apt-get update && sudo apt-get install -y gcc 
      - run: gcc -shared -fPIC -o libpayload.so src/payload.c 
      - uses: actions/upload-artifact@v4 
        with: 
          name: payload-so 
          path: libpayload.so 
